<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-family:'Segoe UI',sans-serif;
        }

        .register-card{
            width:420px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(14px);
            border-radius:24px;
            padding:40px;
            box-shadow:0 8px 30px rgba(0,0,0,0.4);
            border:1px solid rgba(255,255,255,0.08);
        }

        .register-icon{
            font-size:50px;
            text-align:center;
            margin-bottom:10px;
        }

        .register-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .form-control{
            background:rgba(255,255,255,0.1);
            border:none;
            color:white;
            padding:12px;
            border-radius:12px;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.15);
            color:white;
            box-shadow:none;
        }

        .form-label{
            margin-bottom:8px;
            font-weight:500;
        }

        .btn-register{
            width:100%;
            background:linear-gradient(90deg,#06b6d4,#3b82f6);
            border:none;
            padding:12px;
            border-radius:12px;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-register:hover{
            transform:translateY(-2px);
            opacity:0.95;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
            color:#cbd5e1;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="register-icon">
        🚗
    </div>

    <h2 class="register-title">
        Create Your Account
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>

            <input 
                type="text" 
                name="username" 
                class="form-control" 
                placeholder="Enter username"
                required
            >
        </div>

        <div class="mb-4">
            <label class="form-label">
                Password
            </label>

            <input 
                type="password" 
                name="password" 
                class="form-control" 
                placeholder="Enter password"
                required
            >
        </div>

        <button class="btn-register" type="submit">
            Register
        </button>

    </form>

    <p class="bottom-text">
        Already have an account?
        <a href="{{ url_for('login') }}">
            Login
        </a>
    </p>

</div>

</body>
</html>
